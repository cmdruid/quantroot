<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantroot Faucet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e4e4ed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    h1 span { color: #f7931a; }
    .subtitle {
      color: #9494a8;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9494a8;
      margin-bottom: 0.5rem;
    }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 0.5rem;
      color: #e4e4ed;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
    }
    input:focus {
      outline: none;
      border-color: #8b5cf6;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #8b5cf6;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #7c3aed; }
    button:disabled {
      background: #2a2a3a;
      color: #9494a8;
      cursor: not-allowed;
    }
    .result {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 0.5rem;
      font-size: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      word-break: break-all;
    }
    .result.success {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    .result.error {
      background: rgba(247, 147, 26, 0.1);
      border: 1px solid rgba(247, 147, 26, 0.3);
      color: #f7931a;
    }
    .hidden { display: none; }
    a { color: #8b5cf6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: #9494a8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span>Q</span>uantroot Faucet</h1>
    <p class="subtitle">Get test coins for quantum-insured wallet development.</p>

    <form id="faucet-form">
      <div class="form-group">
        <label>Bitcoin Address</label>
        <input type="text" id="address" placeholder="bc1p... or bcrt1p..." required>
      </div>
      <button type="submit" id="submit-btn">Request Coins</button>
    </form>

    <div id="result" class="result hidden"></div>

    <div class="footer">
      <a href="https://www.quantroot.org">www.quantroot.org</a> &mdash;
      <a href="https://github.com/cmdruid/quantroot">GitHub</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('faucet-form');
    const btn = document.getElementById('submit-btn');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const address = document.getElementById('address').value.trim();
      if (!address) return;

      btn.disabled = true;
      btn.textContent = 'Sending...';
      result.classList.add('hidden');

      try {
        const res = await fetch('/api/faucet', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address }),
        });
        const data = await res.json();

        if (res.ok) {
          result.className = 'result success';
          result.textContent = `Sent ${data.amount} BTC\nTXID: ${data.txid}`;
        } else {
          result.className = 'result error';
          result.textContent = data.error;
        }
      } catch (err) {
        result.className = 'result error';
        result.textContent = 'Network error. Is the faucet running?';
      }

      result.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Request Coins';
    });
  </script>
</body>
</html>
