# Quantroot Docker Compose Stack
#
# Script mount contract:
#   - ./scripts    -> /dscript      (runtime helpers, all services)
#   - ./test/scripts -> /dtestscript  (test runners, test services only)
#   - ./dev/scripts  -> NOT mounted  (developer-only)
#
# Usage:
#   docker compose up -d
#   docker compose down

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 30s

services:
  bitcoin:
    build:
      context: .
      dockerfile: services/bitcoin/Dockerfile
      target: runtime
    container_name: quantroot-bitcoin
    restart: unless-stopped
    volumes:
      - ./data/demo-node:/data
      - ./config/bitcoin:/config:ro
    command: >
      -conf=/config/regtest.conf
      -datadir=/data
      -printtoconsole
    ports:
      - "19443:18443"
      - "19444:18444"
      - "29332:28332"
      - "29333:28333"
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=quantroot",
             "-rpcpassword=quantroot", "getblockchaininfo"]

  faucet:
    build:
      context: services/faucet
    container_name: quantroot-faucet
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - FAUCET_RPC_URL=http://quantroot-bitcoin:18443
      - FAUCET_RPC_USER=quantroot
      - FAUCET_RPC_PASS=quantroot
      - FAUCET_RPC_WALLET=faucet
      - FAUCET_AMOUNT=0.001
      - FAUCET_RATE_LIMIT_SECONDS=3600
      - FAUCET_PORT=3000
    depends_on:
      bitcoin:
        condition: service_healthy
    logging: *default-logging
