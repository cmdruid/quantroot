# Quantroot Docker Compose Stack
#
# Script mount contract:
#   - ./scripts    -> /dscript      (runtime helpers, all services)
#   - ./test/scripts -> /dtestscript  (test runners, test services only)
#   - ./dev/scripts  -> NOT mounted  (developer-only)
#
# Usage:
#   docker compose up -d
#   docker compose down

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 30s

services:
  bitcoin:
    build:
      context: .
      dockerfile: services/bitcoin/Dockerfile
      target: runtime
    container_name: quantroot-bitcoin
    restart: unless-stopped
    volumes:
      - ./data/bitcoin:/data
      - ./config/bitcoin:/config:ro
    command: >
      bitcoind
        -conf=/config/regtest.conf
        -datadir=/data
        -printtoconsole
    ports:
      - "18443:18443"
      - "18444:18444"
      - "28332:28332"
      - "28333:28333"
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=quantroot",
             "-rpcpassword=quantroot", "getblockchaininfo"]
